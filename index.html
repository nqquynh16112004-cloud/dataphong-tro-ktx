<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e4e0d8;
    --border2: #ccc8be;
    --text: #1a1915;
    --text2: #6b6760;
    --text3: #9c9890;
    --accent: #1b4fd8;
    --accent-bg: #eef2fc;
    --accent-text: #1238a0;
    --green-bg: #e8f5e2;
    --green-text: #2a6018;
    --red-bg: #fceaea;
    --red-text: #8b2020;
    --amber-bg: #fef3d8;
    --amber-text: #7a4a0a;
    --teal-bg: #e0f4ee;
    --teal-text: #0d5c42;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    background: #111827;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    text-decoration: none;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff;
  }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .logo-sub { font-size: 11px; color: #9ca3af; margin-top: 1px; }
  .header-badge {
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: #9ca3af;
  }

  /* ── MAIN LAYOUT ─────────────────────────── */
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  /* ── STATS ROW ───────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) { .stats { grid-template-columns: repeat(2,1fr); } }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.1rem;
    box-shadow: var(--shadow);
  }
  .stat-icon { font-size: 18px; margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
  .stat-lbl { font-size: 11px; color: var(--text2); font-weight: 500; letter-spacing: .02em; text-transform: uppercase; }
  .stat-val.green { color: #1a7a3a; }

  /* ── FILTER BAR ──────────────────────────── */
  .filterbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: .75rem 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }
  .tabs { display: flex; gap: 4px; }
  .tab {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    transition: all .15s;
  }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.on {
    background: var(--accent-bg);
    color: var(--accent-text);
    border-color: #b8c9f5;
  }
  .filter-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .search-wrap { position: relative; margin-left: auto; }
  .search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
  input.srch {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px 6px 30px;
    font-size: 13px;
    width: 200px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  input.srch:focus { border-color: var(--accent); background: var(--surface); }
  @media (max-width: 600px) { input.srch { width: 150px; } }

  /* ── GRID ────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; gap: 8px; } }

  /* ── CARD ────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.1rem;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .12s;
    box-shadow: var(--shadow);
    position: relative;
  }
  .card:hover {
    border-color: var(--border2);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .card.sel {
    border-color: var(--accent);
    border-width: 2px;
    box-shadow: 0 0 0 3px rgba(27,79,216,.12), var(--shadow-md);
    transform: none;
  }
  .card-sel-dot {
    position: absolute;
    top: 10px; right: 10px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: none;
  }
  .card.sel .card-sel-dot { display: block; }

  .tpill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .tk { background: var(--teal-bg); color: var(--teal-text); }
  .tt { background: var(--amber-bg); color: var(--amber-text); }

  .cname { font-size: 13px; font-weight: 600; margin-bottom: 3px; line-height: 1.35; color: var(--text); }
  .caddr { font-size: 11px; color: var(--text2); margin-bottom: 10px; line-height: 1.4; display: flex; align-items: flex-start; gap: 3px; }
  .caddr i { font-size: 12px; margin-top: 1px; flex-shrink: 0; }

  .cprice { font-size: 18px; font-weight: 600; color: var(--accent); line-height: 1; }
  .cprice-unit { font-size: 11px; font-weight: 400; color: var(--text3); margin-left: 1px; }

  .cfoot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .badge {
    font-size: 11px; font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
  }
  .badge-ok { background: var(--green-bg); color: var(--green-text); }
  .badge-no { background: var(--red-bg); color: var(--red-text); }
  .cslots { font-size: 11px; color: var(--text3); font-weight: 500; }

  /* ── DETAIL PANEL ────────────────────────── */
  .det {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-md);
    animation: slideIn .18s ease;
    border-left: 4px solid var(--accent);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .det-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  .det-name { font-size: 20px; font-weight: 600; margin: 6px 0 4px; }
  .det-addr { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .btn-close {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text2);
    font-family: inherit;
    font-weight: 500;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
    transition: all .15s;
    flex-shrink: 0;
  }
  .btn-close:hover { background: var(--red-bg); color: var(--red-text); border-color: #f0c0c0; }

  .det-divider { height: 1px; background: var(--border); margin: 1rem 0; }

  .det-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  @media (max-width: 600px) { .det-grid { grid-template-columns: repeat(2,1fr); } }
  .det-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: .75rem;
  }
  .det-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .det-val { font-size: 15px; font-weight: 600; }
  .det-val.price { color: var(--accent); font-size: 20px; }

  .sec-lbl {
    font-size: 10px; font-weight: 600;
    color: var(--text3);
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 8px;
  }
  .amenities { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .am {
    font-size: 12px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    font-weight: 500;
    display: flex; align-items: center; gap: 4px;
  }

  .notes-box {
    background: #fffbf0;
    border: 1px solid #edd97a;
    border-left: 4px solid #e0b800;
    border-radius: var(--radius-md);
    padding: .85rem 1rem;
    font-size: 13px;
    color: #5a4a00;
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .det-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-action {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 16px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .btn-action:hover { background: var(--surface2); border-color: var(--border2); }
  .btn-action.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-action.primary:hover { background: #1238a0; }
  .btn-action.phone {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: #b8e0a0;
  }
  .btn-action.phone:hover { background: #d4eecc; }

  /* ── EMPTY ───────────────────────────────── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text2);
    grid-column: 1 / -1;
  }
  .empty i { font-size: 40px; color: var(--text3); margin-bottom: .75rem; display: block; }
  .empty p { font-size: 14px; }

  /* ── FOOTER ──────────────────────────────── */
  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 12px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    margin-top: .5rem;
  }
</style>
</head>

    a:'Hẻm 196 Đường 11, Trường Thọ, Thủ Đức',
    p1:5.0, p2:5.0, g:'Nam + Nữ', s:'Còn phòng', sl:null,
    ph:'0906349596', ct:'Cô Hương (Long Hương)',
    am:['Full nội thất','Máy lạnh','Gác lửng','Bếp từ','Thang máy riêng','WC riêng','Máy nóng lạnh','Phòng giặt riêng','Wifi','Giữ xe'],
    no:'Full nội thất cao cấp. Quản lý 200k/tháng (bao vệ sinh + rác + giặt + internet). Giữ xe 80k. Thang máy riêng.' },

  { id:'t8', t:'TRỌ', n:'Ánh Nga',
    a:'29/1 Đường 16, Linh Chiểu, Thủ Đức',
    p1:3.2, p2:3.2, g:null, s:'Còn phòng', sl:null,
    ph:'0799987512', ct:'Ánh Nga',
    am:[],
    no:'⚠ Thông tin chưa đầy đủ — cần khảo sát thêm trước khi tư vấn.' },

  { id:'t9', t:'TRỌ', n:'Út Nghĩa — 3.5tr',
    a:'Hẻm 29, Thủ Đức',
    p1:3.5, p2:3.5, g:'Nam + Nữ', s:'Còn phòng', sl:null,
    ph:null, ct:'Út Nghĩa',
    am:[],
    no:'⚠ Chưa có SĐT trong hệ thống — cần cập nhật thêm thông tin.' },

  { id:'t10', t:'TRỌ', n:'Út Nghĩa — 4.0tr',
    a:'Hẻm 29, Thủ Đức',
    p1:4.0, p2:4.0, g:'Nam + Nữ', s:'Còn phòng', sl:null,
    ph:null, ct:'Út Nghĩa',
    am:[],
    no:'⚠ Chưa có SĐT trong hệ thống — cần cập nhật thêm thông tin.' },
];

let flt = 'all', sel = null, q = '';

function fmt(d) {
  return d.p1 === d.p2 ? d.p1 + 'tr' : d.p1 + ' – ' + d.p2 + 'tr';
}
function vis() {
  return D.filter(d => {
    if (flt === 'ktx' && d.t !== 'KTX') return false;
    if (flt === 'tro' && d.t !== 'TRỌ') return false;
    if (q) {
      const ql = q.toLowerCase();
      if (![d.n, d.a, d.ct || ''].some(v => v.toLowerCase().includes(ql))) return false;
    }
    return true;
  });
}

function rStats() {
  const k = D.filter(d => d.t === 'KTX');
  const tr = D.filter(d => d.t === 'TRỌ');
  const s = [
    { icon: 'ti-building', v: k.length, l: 'Tổng KTX', green: false },
    { icon: 'ti-circle-check', v: k.filter(d => d.s.includes('Còn')).length, l: 'KTX còn chỗ', green: true },
    { icon: 'ti-home', v: tr.length, l: 'Tổng phòng trọ', green: false },
    { icon: 'ti-door-enter', v: tr.filter(d => d.s.includes('Còn')).length, l: 'Trọ còn phòng', green: true },
  ];
  document.getElementById('stats').innerHTML = s.map(x => `
    <div class="stat">
      <div class="stat-icon" style="color:${x.green ? '#1a7a3a' : '#6b6760'}"><i class="ti ${x.icon}"></i></div>
      <div class="stat-val${x.green ? ' green' : ''}">${x.v}</div>
      <div class="stat-lbl">${x.l}</div>
    </div>
  `).join('');
}

function rTabs() {
  const counts = { all: D.length, ktx: D.filter(d => d.t === 'KTX').length, tro: D.filter(d => d.t === 'TRỌ').length };
  const tabs = [
    { id: 'all', label: 'Tất cả', count: counts.all },
    { id: 'ktx', label: 'KTX', count: counts.ktx },
    { id: 'tro', label: 'Phòng trọ', count: counts.tro },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(tb => `
    <button class="tab ${flt === tb.id ? 'on' : ''}" onclick="setF('${tb.id}')">
      ${tb.label} <span style="opacity:.6">(${tb.count})</span>
    </button>
  `).join('');
}

function rGrid() {
  const items = vis();
  const g = document.getElementById('grid');
  if (!items.length) {
    g.innerHTML = `<div class="empty"><i class="ti ti-search-off"></i><p>Không tìm thấy kết quả nào</p></div>`;
    return;
  }
  g.innerHTML = items.map(d => `
    <div class="card ${sel === d.id ? 'sel' : ''}" onclick="pick('${d.id}')">
      <div class="card-sel-dot"></div>
      <span class="tpill ${d.t === 'KTX' ? 'tk' : 'tt'}">
        <i class="ti ${d.t === 'KTX' ? 'ti-building' : 'ti-home'}" style="font-size:10px"></i>${d.t}
      </span>
      <div class="cname">${d.n}</div>
      <div class="caddr"><i class="ti ti-map-pin"></i>${d.a}</div>
      <div class="cprice">${fmt(d)}<span class="cprice-unit">tr/tháng</span></div>
      <div class="cfoot">
        <span class="badge ${d.s.includes('Còn') ? 'badge-ok' : 'badge-no'}">${d.s}</span>
        ${d.sl !== null ? `<span class="cslots"><i class="ti ti-users" style="font-size:11px;vertical-align:-1px"></i> ${d.sl} slot</span>` : ''}
      </div>
    </div>
  `).join('');
}

function rDet() {
  const el = document.getElementById('det');
  if (!sel) { el.innerHTML = ''; return; }
  const d = D.find(x => x.id === sel);
  if (!d) { el.innerHTML = ''; return; }

  const phoneBtn = d.ph
    ? `<a href="tel:${d.ph}" class="btn-action phone"><i class="ti ti-phone" style="font-size:15px"></i><strong>${d.ct}</strong>: ${d.ph}</a>`
    : `<span class="btn-action" style="opacity:.5;cursor:default"><i class="ti ti-phone-off" style="font-size:15px"></i>${d.ct} — chưa có SĐT</span>`;

  el.innerHTML = `
    <div class="det">
      <div class="det-header">
        <div>
          <span class="tpill ${d.t === 'KTX' ? 'tk' : 'tt'}">
            <i class="ti ${d.t === 'KTX' ? 'ti-building' : 'ti-home'}" style="font-size:10px"></i>${d.t}
          </span>
          <div class="det-name">${d.n}</div>
          <div class="det-addr"><i class="ti ti-map-pin"></i>${d.a}</div>
        </div>
        <button class="btn-close" onclick="pick(null)"><i class="ti ti-x" style="font-size:13px"></i>Đóng</button>
      </div>

      <div class="det-grid">
        <div class="det-block">
          <div class="det-lbl">Giá thuê</div>
          <div class="det-val price">${fmt(d)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">triệu/tháng</div>
        </div>
        <div class="det-block">
          <div class="det-lbl">Đối tượng</div>
          <div class="det-val">${d.g || '—'}</div>
        </div>
        <div class="det-block">
          <div class="det-lbl">Slot còn</div>
          <div class="det-val">${d.sl !== null ? d.sl : '—'}</div>
        </div>
        <div class="det-block">
          <div class="det-lbl">Trạng thái</div>
          <span class="badge ${d.s.includes('Còn') ? 'badge-ok' : 'badge-no'}" style="display:inline-block;margin-top:4px">${d.s}</span>
        </div>
      </div>

      ${d.am.length ? `
        <div class="det-divider"></div>
        <div class="sec-lbl"><i class="ti ti-sparkles" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>Tiện ích</div>
        <div class="amenities">${d.am.map(a => `<span class="am"><i class="ti ti-check" style="font-size:11px;color:#1a7a3a"></i>${a}</span>`).join('')}</div>
      ` : ''}

      ${d.no ? `
        <div class="det-divider"></div>
        <div class="sec-lbl"><i class="ti ti-notes" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>Ghi chú</div>
        <div class="notes-box">${d.no}</div>
      ` : ''}

      <div class="det-divider"></div>
      <div class="sec-lbl"><i class="ti ti-address-book" style="font-size:11px;vertical-align:-1px;margin-right:3px"></i>Liên hệ & ảnh</div>
      <div class="det-actions">
        ${phoneBtn}
        <a href="${DRIVE}" target="_blank" class="btn-action primary">
          <i class="ti ti-photo" style="font-size:15px"></i>Xem ảnh Drive
        </a>
      </div>
    </div>
  `;
}

function render() { rStats(); rTabs(); rDet(); rGrid(); }

window.setF = f => { flt = f; sel = null; render(); };
window.setQ = v => { q = v; sel = null; rGrid(); };
window.pick = id => { sel = (sel === id) ? null : id; rDet(); rGrid(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

render();
</script>
</body>
</html>
